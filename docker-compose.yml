services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: colosseum-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: colosseum-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./config:/config:ro
    depends_on:
      - backend

